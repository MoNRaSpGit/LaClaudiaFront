name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production API URL
        env:
          VITE_API_URL_PROD: ${{ vars.VITE_API_URL_PROD }}
        run: |
          if [ -z "$VITE_API_URL_PROD" ]; then
            echo "Falta variable VITE_API_URL_PROD en GitHub Actions Variables."
            exit 1
          fi

      - name: Build
        env:
          VITE_BASE_PATH: /LaClaudiaFront/
          VITE_API_URL: ${{ vars.VITE_API_URL_PROD }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
